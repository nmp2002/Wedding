<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Thiệp Mời Cưới</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,700;1,500&family=Cinzel:wght@500;700&family=Great+Vibes&display=swap" rel="stylesheet" />
  <style>
    :root{
      --bg:#e9e7e4;
      --paper:#f8f6f2;
      --seal-1:#f1c5bb;
      --seal-2:#cb9188;
      --olive:#6d7442;
      /* invite card position/rotation tuning (desktop) */
      --card-closed-ty: 42px;
      --card-open-ty: -175px;
      --card-active-ty: -230px;
      --card-rotate: -6deg;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      background:var(--bg);
      font-family:"Cormorant Garamond", serif;
      color:#2f1e1d;
    }

    .scene{
      width:min(980px, 98vw);
      padding:24px 12px 26px;
      text-align:center;
    }

    .envelopeBtn{
      border:0;
      background:transparent;
      padding:0;
      cursor:pointer;
    }

    .envelopeFrame{
      width:min(520px, 80vw);
      margin:0 auto;
      padding:0;
      background:transparent;
      border:none;
      border-radius:6px;
      box-shadow:0 30px 60px rgba(0,0,0,.18);
      position:relative;
      z-index:3;
    }

    /* floral overlays (positioned around the envelope)
       Adjusted so blooms sit visually above the envelope and are fixed to its frame. */
    .flower-overlay{
      position:absolute;
      pointer-events:none;
      z-index:60; /* high so flower sits above envelope and card */
      user-select:none;
      image-rendering: -webkit-optimize-contrast;
      background-color:transparent;
    }

    /* Top-left bloom: position at the frame corner, JS will nudge by translate() */
    .flower-top-left{
      left: 0;
      top: 0;
      width: clamp(400px, 28vw, 700px); /* doubled min so it stays much larger on small screens */
      transform-origin: left top;
      mix-blend-mode: normal; /* ensure color looks natural on top */
      z-index:80; /* keep it clearly above envelope and flap */
      pointer-events:none;
    }

    /* Bottom-right bloom: anchored to the envelope frame, overlaps lower-right */
    .flower-bottom-right{
      /* Bottom-right anchored; JS will nudge via translate() so it scales with image */
      right: 0;
      bottom: 0;
      width: clamp(360px, 24vw, 560px); /* doubled min so it stays much larger on small screens */
      transform-origin: right bottom;
      mix-blend-mode: normal;
      z-index:65;
      pointer-events:none;
    }

    @media (max-width:680px){
      /* small adjustments: raise slightly and nudge left a bit */
      .flower-top-left{ left: -12px; top: 12px; width:520px; transform: rotate(-12deg); }
      /* raised a bit and nudged slightly left */
      .flower-bottom-right{ right: -8px; bottom: -48px; width:440px; transform: rotate(10deg); }
    }

    .envelope{
      position:relative;
      width:100%;
      aspect-ratio:139 / 100;
      border-radius:2px;
      overflow:visible;
      background:#7e302d;
      perspective:1200px;
    }

    /* Canvas / linen texture — fine crosshatch */
    .envelope::before{
      content:"";
      position:absolute;
      inset:0;
      background-image:
        repeating-linear-gradient(0deg, rgba(0,0,0,.035) 0 1px, transparent 1px 3px),
        repeating-linear-gradient(90deg, rgba(0,0,0,.035) 0 1px, transparent 1px 3px);
      pointer-events:none;
      z-index:11;
    }

    .envelope::after{
      display:none;
    }

    .backFlapShell{
      display:none;
    }

    .backFlapPaper{
      display:none;
    }

    .backFlapPaper::before{
      display:none;
    }

    /* White inner lining of envelope — revealed when opened */
    .envelopeLiner{
      position:absolute;
      left:5%;
      right:5%;
      top:3%;
      bottom:3%;
      background:linear-gradient(180deg, #fffefe 0%, #f4f2ef 60%, #edeae6 100%);
      border-radius:4px;
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.6);
      z-index:2;
      opacity:0;
      transition:opacity .42s ease;
      pointer-events:none;
    }

    .envelopeLiner::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(120% 100% at 50% 10%, rgba(255,255,255,.4), transparent 50%),
        repeating-linear-gradient(0deg, rgba(0,0,0,.012) 0 1px, transparent 1px 5px);
      pointer-events:none;
    }

    .inviteCard{
      position:absolute;
      left:50%;
      top:75%;
      width:62%;
      height:62%;
      transform:translate(-50%, var(--card-closed-ty)) rotate(var(--card-rotate));
      background:#6d1d23 url('images/saveourdate.jpg') center / cover no-repeat;
      border-radius:4px;
      box-shadow:0 8px 18px rgba(22,10,12,.22);
      opacity:0;
      overflow:visible;
      /* add a longer delay so the flap finishes opening first */
      transition: transform 0.9s cubic-bezier(.2,.82,.2,1), opacity 0.45s 0.86s;
      will-change: transform, opacity;
      z-index:2;
      pointer-events:none;
    }

    .envelope.is-open .inviteCard {
      opacity: 1;
      /* lift the card higher out of the envelope (match reference image) */
      transform: translate(-50%, calc(var(--card-open-ty, 0%) - 20%)) scale(1.06) rotate(var(--card-rotate));
      /* raise card above vinyl but below polaroids */
      z-index: 26;
      pointer-events: auto;
      transition-delay: 0s;
    }

    .envelope.is-card-active .inviteCard {
      z-index: 30;
      /* when active, lift and scale a bit more for emphasis */
      transform: translate(-50%, var(--card-active-ty)) scale(1.12) rotate(var(--card-rotate));
      box-shadow: 0 24px 48px rgba(22,10,12,.32), 0 0 0 6px #fff8;
      opacity: 1;
      cursor: pointer;
      transition: transform 0.5s cubic-bezier(.2,.82,.2,1), box-shadow 0.5s, z-index 0s;
    }

    .flapTop {
      position:absolute;
      left:0;
      right:0;
      top:0;
      height:100%;
      clip-path:url(#flapCurve);
      border-radius:0;
      background:linear-gradient(180deg, #7e302d 0%, #6e2a24 100%);
      backface-visibility:hidden;
      transition:transform 0.7s cubic-bezier(.2,.82,.2,1), z-index 0s 0.3s;
    }

    .envelope.is-open .flapTop {
      transform: rotateX(-110deg);
      z-index: 1;
    }

    .flapTopInner {
      position:absolute;
      left:0;
      right:0;
      top:0;
      height:100%;
      clip-path:url(#flapCurve);
      border-radius:0;
      background:linear-gradient(180deg, #fffefe 0%, #f4f2ef 60%, #edeae6 100%);
      border-radius:4px;
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.6);
      z-index:2;
      opacity:0;
      transition:opacity 0.3s;
    }

    .envelope.is-open .flapTopInner {
      opacity: 1;
    }

    .inviteCard::before{
      content:"";
      position:absolute;
      inset:0;
      /* subtle paper texture only */
      background: repeating-linear-gradient(0deg, rgba(255,255,255,.04) 0 1px, rgba(255,255,255,0) 1px 6px);
      opacity:.06;
      pointer-events:none;
    }

    /* Floral overlays removed per request */

    .pocketBottom,
    .flap{
      position:absolute;
      left:0;
      right:0;
    }

    .pocketBottom{
      bottom:0;
      height:72%;
      clip-path:url(#pocketBottomCurve);
      background:
        linear-gradient(0deg, #843632 0%, #7a2f2c 50%, #6e2a24 100%);
    }

    .pocketBottom::before{
      display:none;
    }

    .pocketBottom::after{
      display:none;
    }

    .foldLine,
    .foldCenter{
      position:absolute;
      pointer-events:none;
      z-index:4;
    }

    .foldLine{
      height:2px;
      background:rgba(0,0,0,.35);
      transform-origin:left center;
      opacity:0;
    }

    .foldTopLeft{
      left:0;
      top:0;
      width:61.5%;
      transform:rotate(35.5deg);
    }

    .foldTopRight{
      right:0;
      top:0;
      width:61.5%;
      transform:rotate(-35.5deg);
      transform-origin:right center;
    }

    .foldBottomLeft{
      left:0;
      bottom:0;
      width:62%;
      transform:rotate(-35deg);
      transform-origin:left bottom;
    }

    .foldBottomRight{
      right:0;
      bottom:0;
      width:62%;
      transform:rotate(35deg);
      transform-origin:right bottom;
    }

    .foldCenter{
      left:50%;
      top:34%;
      width:1px;
      height:32%;
      background:linear-gradient(180deg,
        rgba(0,0,0,.03) 0%,
        rgba(0,0,0,.14) 40%,
        rgba(0,0,0,.14) 60%,
        rgba(0,0,0,.03) 100%);
      transform:translateX(-50%);
      z-index:5;
      box-shadow:1px 0 0 rgba(255,255,255,.04);
    }

    /* Bottom pocket wrapper: drop-shadow going UP, mirror of .flapWrap */
    .pocketBottomWrap{
      position:absolute;
      left:0;
      right:0;
      bottom:0;
      height:72%;
      z-index:4;
      filter:drop-shadow(0 -6px 8px rgba(0,0,0,.22));
    }

    .flapWrap{
      position:absolute;
      left:0;
      right:0;
      top:0;
      height:62%;
      z-index:8;
      transform-style:preserve-3d;
      transform-origin:50% 0;
      transition:transform .82s cubic-bezier(.16,.86,.24,1), opacity .24s linear .18s, z-index 0s 0s;
      filter:drop-shadow(0 8px 10px rgba(0,0,0,.25));
    }

    /* rotate the flap open when `.is-open` is applied */
    .envelope.is-open .flapWrap{
      /* open flap higher (more folded back) to reveal more of the card */
      transform: rotateX(-160deg);
      /* move flap behind polaroids but above flowers' base */
      z-index:14;
    }

    .flapEdge,
    .flapOverlapShadow{
      position:absolute;
      pointer-events:none;
    }

    .flapEdge{
      display:none;
    }

    .flapEdgeLeft{
      left:7.2%;
      top:28.8%;
      width:42.4%;
      transform:rotate(29.2deg);
      transform-origin:left center;
      background:linear-gradient(90deg, rgba(34,14,14,.30), rgba(34,14,14,.08));
    }

    .flapEdgeRight{
      right:7.2%;
      top:28.8%;
      width:42.4%;
      transform:rotate(-29.2deg);
      transform-origin:right center;
      background:linear-gradient(270deg, rgba(34,14,14,.30), rgba(34,14,14,.08));
    }

    .flapOverlapShadow{
      display:none;
    }

    .flap{
      top:0;
      height:100%;
      clip-path:url(#flapCurve);
      border-radius:0;
      background:linear-gradient(180deg, #7e302d 0%, #6e2a24 100%);
      backface-visibility:hidden;
    }

    /* White liner inside flap — visible when flap opens (backface) */


    .flap::after{
      display:none;
    }

    .flap::before{
      display:none;
    }



    .flapCornerShade{
      display:none;
    }

    .seal{
      position:absolute;
      left:50%;
      top:54%;
      transform:translate(-50%, -50%);
      /* remove decorative background so only the DP image shows */
      width:auto;
      height:auto;
      padding:0;
      border-radius:0;
      background:transparent;
      box-shadow:none;
      display:block;
      z-index:9;
      transition:transform .5s ease, opacity .3s ease, z-index 0s 0s;
    }

    .seal::before{ display:none }
    .seal::after{ display:none }

    .sealImg{
      display:block;
      width:auto; /* use intrinsic DP size */
      height:auto;
      max-width:960px; /* scaled up 10x per request */
      object-fit:contain;
      pointer-events:none;
    }

    .sealMark{
      font-family:"Cinzel", serif;
      font-size:22px;
      font-weight:700;
      color:rgba(90,48,44,.85);
      display:flex;
      flex-direction:column;
      align-items:center;
      line-height:1;
      gap:0px;
      position:relative;
    }

    .sealMark .v-first{
      position:relative;
      z-index:2;
    }

    .sealMark .v-flip{
      display:inline-block;
      transform:scaleY(-1);
      margin-top:-2px;
      position:relative;
      z-index:1;
    }

    .clickHint{
      position:absolute;
      left:50%;
      bottom:38px;
      transform:translateX(-50%);
      font-size:20px;
      font-style:italic;
      line-height:1;
      color:#f5ebe8;
      text-decoration:underline;
      text-underline-offset:3px;
      text-shadow:0 2px 8px rgba(17,8,9,.42);
      z-index:5;
      transition:opacity .35s ease;
    }



    .envelope.is-open::after{
      opacity:.14;
    }

    .envelope.is-open{
      overflow:visible;
    }













    .scene.is-open .dateText{ opacity:0; transform:translateY(-10px); }

    .dateText{
      margin-top:40px;
      font-family:"Great Vibes", cursive;
      font-size:clamp(48px, 4vw, 58px);
      font-style:normal;
      line-height:1;
      color:var(--olive);
      text-shadow:0 1px 0 rgba(255,255,255,.3);
      transition:opacity .32s ease, transform .32s ease;
    }

    @media (max-width:680px){
      .envelopeFrame{width:min(520px, 92vw)}
      .seal{width:56px;height:56px;top:51.9%}
      .sealMark{font-size:29px}
      .clickHint{bottom:14px}
      .dateText{margin-top:20px}
    }

    /* Mobile-specific polish: more visible back flap protrude and card placement */
    @media (max-width:480px){
      .envelopeFrame{padding:0;border:none;width:94vw}
      .envelope{aspect-ratio: 140 / 100}
      .backFlapShell{display:none}
      .backFlapPaper{display:none}
      .flapWrap{transform-origin:50% 5px}
      .flap{clip-path:url(#flapCurve);box-shadow:0 8px 14px rgba(20,10,10,.22)}

      .pocketBottomWrap{bottom:0;height:72%}
      .pocketBottom{height:100%;clip-path:url(#pocketBottomCurve)}

      .seal{top:51.4%;width:50px;height:50px}
      .sealMark{font-size:26px}
      .inviteCard{width:74%;height:66%;transform:translate(-50%,42px) rotate(-7deg)}
      .envelope.is-open .inviteCard{transform:translate(-55%,-88px) rotate(-9deg);box-shadow:0 20px 28px rgba(16,8,8,.32)}
      .envelope.is-open .flapWrap{transform:translateY(-4px) rotateX(-162deg)}
      .envelope.is-open .seal{transform:translate(-50%, -360%) scale(.88)}
      .clickHint{font-size:clamp(12px,3.2vw,16px);bottom:10px}
    }

    /* Polaroid & vinyl reveal styles */
    .polaroid{position:absolute;pointer-events:none;background:transparent;border-radius:6px;padding:0;box-shadow:none;opacity:0;transform-origin:center center;transition:transform .7s cubic-bezier(.2,.85,.2,1),opacity .45s;z-index:24;user-select:none;image-rendering:-webkit-optimize-contrast}
     /* Polaroid styled to visually reference `.inviteCard` while preserving
       transparency in the image. Hide the old pseudo-frame and apply the
       invite-card shadow/border to the container so transparent PNG areas
       reveal the card beneath. */
     .polaroid::before{display:none}
     .polaroid{
      background:transparent;
      border-radius:4px;
      box-shadow:0 8px 18px rgba(22,10,12,.22);
      border:1px solid rgba(0,0,0,.04);
      padding:6px;
     }
    /* Ghi đè lại các style cũ */
    .polaroid {
      position: absolute;
      width: auto; /* allow container to size by max-width */
      max-width: 46%; /* cap full-size attempts when revealed */
      z-index: 70; /* Above card, below floral overlays */
      opacity: 0;
      transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      pointer-events: none;
      padding: 0;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      transform-origin: center center;
      visibility: visible;
    }

    .polaroid img {
      width: 100%;
      height: auto;
      display: block;
      transform: none !important;
      max-width: 100%;
      box-sizing: border-box;
    }

    /* Vị trí ban đầu (ẩn trong phong bì) */
    .pol-left { left: 50%; top: 50%; transform: translate(-50%, -50%) rotate(0deg); }
    .pol-right { left: 50%; top: 50%; transform: translate(-50%, -50%) rotate(0deg); }

    /* Vị trí khi BUNG ra (giống ảnh mẫu) */
    .pol-left.revealed {
      opacity: 1;
      left: 6%;
      top: -42%; /* Bay lên trên bên trái */
      transform: rotate(-15deg);
      width: 46%;
    }

    .pol-right.revealed {
      opacity: 1;
      left: 58%;
      top: -36%; /* Bay lên trên bên phải */
      transform: rotate(10deg);
      width: 46%;
    }

    /* fallback: ensure any .polaroid.revealed shows at a usable size */
    .polaroid.revealed{opacity:1;width:46%;}

    /* Đĩa nhạc (Vinyl) */
    .vinyl {
      position: absolute;
      width: 30%;
      left: 50%;
      top: 50%;
      z-index: 20;
      opacity: 0;
      transform: translate(-50%, -50%);
      transition: all 0.9s ease;
    }

    .vinyl img {
      width: 100%;
      transform: none !important;
    }

    .vinyl.revealed {
      opacity: 1;
      top: -65%; /* Bay lên cao nhất, chính giữa */
      transform: translate(-50%, 0) rotate(360deg);
    }

    /* Điều chỉnh Z-index nắp để không che ảnh */
    .envelope.is-open .flapWrap {
      z-index: 10;
    }

    /* Revealed state (applied via JS) */
    .polaroid.revealed{opacity:1;transform:translateY(-140px) rotate(-12deg) scale(1.04)}
    .vinyl.revealed{opacity:1;transform:translate(-50%,-36%) scale(1.08)}

    /* Slight adjustments when card is active */
    .envelope.is-card-active .polaroid{transform:translateY(-160px) scale(1.06)}

    /* responsive tweaks */
    @media (max-width:680px){
      .pol-left{left:6%;width:36%;top:54%;}
      .pol-right{right:6%;width:36%;top:58%;}
      .vinyl{width:36%;top:32%}
    }
  </style>
</head>
<body>
  <!-- SVG clip-path for curved flap edge -->
  <svg width="0" height="0" style="position:absolute">
    <defs>
      <!-- Top flap: ~45deg triangle, small rounded tip -->
      <clipPath id="flapCurve" clipPathUnits="objectBoundingBox">
        <path d="M0,0 L1,0 L0.5,0.88 C0.49,0.885 0.495,0.89 0.5,0.89 C0.505,0.89 0.51,0.885 0.5,0.88 Z"/>
      </clipPath>
      <!-- Bottom pocket: inverted triangle, mirror of flapCurve -->
      <clipPath id="pocketBottomCurve" clipPathUnits="objectBoundingBox">
        <path d="M0,1 L1,1 L0.5,0.12 C0.49,0.115 0.495,0.11 0.5,0.11 C0.505,0.11 0.51,0.115 0.5,0.12 Z"/>
      </clipPath>
      <!-- Left pocket: diagonal from top-left to center-right, wider angle -->
      <clipPath id="pocketLeftCurve" clipPathUnits="objectBoundingBox">
        <path d="M0,0 L1,0.55 L0,1 Z"/>
      </clipPath>
      <!-- Right pocket: diagonal from top-right to center-left, wider angle -->
      <clipPath id="pocketRightCurve" clipPathUnits="objectBoundingBox">
        <path d="M1,0 L0,0.55 L1,1 Z"/>
      </clipPath>
    </defs>
  </svg>

  <main class="scene" aria-label="Thiệp cưới">
    <button class="envelopeBtn" id="envelopeToggle" type="button" aria-label="Mở hoặc đóng thiệp">
      <div class="envelopeFrame">
        <div class="envelope" id="envelopeArt" aria-hidden="true">
          <div class="backFlapShell" aria-hidden="true"></div>
          <div class="backFlapPaper" aria-hidden="true"></div>
          <div class="envelopeLiner" aria-hidden="true"></div>
          <div class="inviteCard" aria-hidden="true"></div>
          <!-- Polaroid photos and vinyl moved out of inviteCard so they can fly freely -->
          <div class="polaroid pol-left" aria-hidden="true"><img src="images/10.png" alt="Photo 1" /></div>
          <div class="polaroid pol-right" aria-hidden="true"><img src="images/11.png" alt="Photo 2" /></div>
          <div class="vinyl" aria-hidden="true"><img src="images/12.png" alt="Vinyl record" /></div>
          <div class="pocketBottomWrap"><div class="pocketBottom"></div></div>
          <div class="foldLine foldTopLeft" aria-hidden="true"></div>
          <div class="foldLine foldTopRight" aria-hidden="true"></div>
          <div class="foldLine foldBottomLeft" aria-hidden="true"></div>
          <div class="foldLine foldBottomRight" aria-hidden="true"></div>
          <div class="foldCenter" aria-hidden="true"></div>
          <div class="flapEdge flapEdgeLeft" aria-hidden="true"></div>
          <div class="flapEdge flapEdgeRight" aria-hidden="true"></div>
          <div class="flapOverlapShadow" aria-hidden="true"></div>
          <div class="flapWrap">
            <div class="flap"></div>
          </div>
          <div class="flapCornerShade" aria-hidden="true"></div>
          <div class="seal"><img src="images/DP.png" alt="DP seal" class="sealImg" aria-hidden="true" /></div>
          <div class="clickHint">Click to Open.</div>
        </div>
        <!-- floral overlays placed around the envelope (uses images/flower.png) -->
        <img src="images/flower.png" class="flower-overlay flower-top-left" alt="flower decoration" aria-hidden="true" />
        <img src="images/flower1.png" class="flower-overlay flower-bottom-right" alt="flower decoration" aria-hidden="true" />
      </div>
    </button>
    <div class="dateText">29.03.2026</div>
  </main>

  <script>
    (function () {
      var btn = document.getElementById('envelopeToggle');
      var envelope = document.getElementById('envelopeArt');
      var card = document.querySelector('.inviteCard');
      if (!btn || !envelope) return;

      btn.addEventListener('click', function () {
        envelope.classList.toggle('is-open');
        envelope.classList.remove('is-card-active');
        document.querySelector('.scene').classList.toggle('is-open', envelope.classList.contains('is-open'));
      });
      if(card){
        card.addEventListener('click', function(e){
          if(envelope.classList.contains('is-open')){
            envelope.classList.toggle('is-card-active');
            e.stopPropagation();
          }
        });
      }
    })();
    /* Remove near-white background for polaroid/vinyl images at runtime.
       Mirrors flower removal but uses a slightly lower threshold (235)
       to catch off-white areas while preserving subtle shadows. */
    (function removePolaroidBackgrounds(){
      if (!window.HTMLCanvasElement) return;
      window.addEventListener('load', function(){
        var imgs = document.querySelectorAll('.polaroid img, .vinyl img');
        imgs.forEach(function(img){
          try{
            var src = img.getAttribute('src') || img.src;
            if(!src) return;
            var tmp = new Image();
            tmp.crossOrigin = 'anonymous';
            tmp.onload = function(){
              var w = tmp.naturalWidth || tmp.width;
              var h = tmp.naturalHeight || tmp.height;
              if(!w || !h) return;
              var c = document.createElement('canvas'); c.width = w; c.height = h;
              var cx = c.getContext('2d'); cx.drawImage(tmp,0,0);
              try{ var id = cx.getImageData(0,0,w,h); }catch(e){ return; }
              var d = id.data; var t = 235; // threshold
              for(var i=0;i<d.length;i+=4){
                var r=d[i], g=d[i+1], b=d[i+2];
                if(r>=t && g>=t && b>=t){ d[i+3] = 0; }
              }
              cx.putImageData(id,0,0);
              try{ img.src = c.toDataURL('image/png'); }catch(e){}
            };
            tmp.src = src + (src.indexOf('?') === -1 ? '?_=' + Date.now() : '&_=' + Date.now());
          }catch(e){}
        });
      });
    })();
    // Interactive nudge tool for floral overlays
    (function(){
      var selected = null;
      var panel = document.createElement('div');
      panel.id = 'tweakPanel';
      panel.style.cssText = 'position:fixed;right:14px;bottom:14px;padding:8px 10px;background:rgba(0,0,0,0.6);color:#fff;border-radius:6px;font-family:Arial,Helvetica,sans-serif;font-size:13px;z-index:9999;display:none;';
      panel.innerHTML = '<div id="tweakLabel">Selected: <span id="tweakName">-</span></div>' +
        '<div style="margin-top:6px">Left: <span id="tweakLeft">0</span>px • Top: <span id="tweakTop">0</span>px</div>' +
        '<div style="margin-top:8px;text-align:right"><button id="tweakCopy" style="margin-right:6px">Copy CSS</button><button id="tweakClose">Close</button></div>';
      document.body.appendChild(panel);
      var lbl = document.getElementById('tweakLabel');
      var nameEl = document.getElementById('tweakName');
      var leftEl = document.getElementById('tweakLeft');
      var topEl = document.getElementById('tweakTop');
      var copyBtn = document.getElementById('tweakCopy');
      var closeBtn = document.getElementById('tweakClose');

      function showPanel(forEl){
        selected = forEl;
        panel.style.display = 'block';
        nameEl.textContent = forEl.className.split(' ').join(', ');
        updateValues();
      }
      function hidePanel(){ panel.style.display='none'; selected=null; }
      function updateValues(){
        if(!selected) return;
        var cs = window.getComputedStyle(selected);
        var left = parseFloat(cs.left) || 0;
        var top = parseFloat(cs.top) || 0;
        leftEl.textContent = Math.round(left);
        topEl.textContent = Math.round(top);
      }

      document.querySelectorAll('.flower-overlay').forEach(function(img){
        img.style.cursor='move';
        img.addEventListener('click', function(e){
          e.stopPropagation();
          showPanel(img);
        });
      });

      window.addEventListener('keydown', function(e){
        if(!selected) return;
        var step = e.shiftKey ? 10 : 2;
        var cs = window.getComputedStyle(selected);
        var left = parseFloat(cs.left) || 0;
        var top = parseFloat(cs.top) || 0;
        if(e.key === 'ArrowLeft') { left -= step; }
        else if(e.key === 'ArrowRight') { left += step; }
        else if(e.key === 'ArrowUp') { top -= step; }
        else if(e.key === 'ArrowDown') { top += step; }
        else if(e.key === 'Escape') { hidePanel(); }
        else return;
        selected.style.left = left + 'px';
        selected.style.top = top + 'px';
        updateValues();
        e.preventDefault();
      });

      copyBtn.addEventListener('click', function(){
        if(!selected) return;
        var cls = selected.className.split(' ').join('.');
        var cs = window.getComputedStyle(selected);
        var left = cs.left; var top = cs.top; var w = cs.width; var transform = cs.transform;
        var css = '.' + selected.className.split(' ').join('.') + ' { left: ' + left + '; top: ' + top + '; width: ' + w + '; transform: ' + transform + '; }';
        navigator.clipboard && navigator.clipboard.writeText(css);
        copyBtn.textContent = 'Copied';
        setTimeout(function(){ copyBtn.textContent='Copy CSS'; },1200);
      });
      closeBtn.addEventListener('click', hidePanel);
      // click outside to deselect
      document.addEventListener('click', function(){ hidePanel(); });
    })();
    /* Remove near-white background from overlay images at runtime.
       Creates a temporary canvas, converts near-white pixels to transparent,
       and replaces the image src with a data URL PNG. */
    (function removeFlowerBackgrounds(){
      if (!window.HTMLCanvasElement) return;
      var imgs = document.querySelectorAll('.flower-overlay');
      imgs.forEach(function(img){
        try{
          var src = img.src;
          var tmp = new Image();
          tmp.crossOrigin = 'anonymous';
          tmp.onload = function(){
            var w = tmp.naturalWidth || tmp.width;
            var h = tmp.naturalHeight || tmp.height;
            if (!w || !h) return;
            var c = document.createElement('canvas');
            c.width = w; c.height = h;
            var cx = c.getContext('2d');
            cx.drawImage(tmp,0,0);
            try{
              var id = cx.getImageData(0,0,w,h);
            }catch(e){
              return; // cross-origin or security error
            }
            var d = id.data;
            // threshold: how close to white a pixel must be to be removed
            var t = 250; // 0-255 (higher = stricter white)
            for(var i=0;i<d.length;i+=4){
              var r=d[i], g=d[i+1], b=d[i+2];
              // if pixel is nearly white, make it transparent
              if(r>=t && g>=t && b>=t){
                d[i+3] = 0;
              }
            }
            cx.putImageData(id,0,0);
            try{
              img.src = c.toDataURL('image/png');
            }catch(e){
              // ignore
            }
          };
          tmp.src = src;
        }catch(e){
          // fail silently
        }
      });
    })();
    /* Ensure polaroid/vinyl images load the updated (server-processed) files.
       Server-side scripts in `tools/` now write transparent PNGs; this forces
       the browser to reload them (cache-bust) on page load. */
    (function refreshPolaroids(){
      window.addEventListener('load', function(){
        var imgs = document.querySelectorAll('.polaroid img, .vinyl img');
        imgs.forEach(function(img){
          try{
            var src = img.getAttribute('src') || img.src;
            if(!src) return;
            img.src = src + (src.indexOf('?') === -1 ? '?_=' + Date.now() : '&_=' + Date.now());
          }catch(e){}
        });
      });
    })();
    /* JS positioning for flower overlays: compute translate based on image size
       so offsets scale correctly across viewports. Runs on load + resize. */
    (function positionFlowerOverlays(){
      var frame = document.querySelector('.envelopeFrame');
      var topImg = document.querySelector('.flower-top-left');
      var botImg = document.querySelector('.flower-bottom-right');
      if(!frame || (!topImg && !botImg)) return;

      function applyPositions(){
        // ensure CSS width applied before measuring
        if(topImg){
          var w = topImg.offsetWidth || topImg.naturalWidth || 0;
          var h = topImg.offsetHeight || topImg.naturalHeight || 0;
          topImg.style.left = '0px';
          topImg.style.top = '0px';
          var isSmall = window.matchMedia && window.matchMedia('(max-width:680px)').matches;
          var topXMult = isSmall ? 0.46 : 0.44; // slightly more left on small
          var topYMult = isSmall ? 0.02 : 0.16; // keep small upward translate minimal so bloom sits slightly higher
          topImg.style.transform = 'translate(' + Math.round(-w * topXMult) + 'px,' + Math.round(-h * topYMult) + 'px) rotate(-10deg)';
          topImg.style.transformOrigin = 'left top';
        }
        if(botImg){
          var w2 = botImg.offsetWidth || botImg.naturalWidth || 0;
          var h2 = botImg.offsetHeight || botImg.naturalHeight || 0;
          botImg.style.right = '0px';
          botImg.style.bottom = '0px';
          var isSmall = window.matchMedia && window.matchMedia('(max-width:680px)').matches;
          var botXMult = isSmall ? 0.36 : 0.36; // nudge slightly left on small screens
          var botYMult = isSmall ? 0.80 : 0.72; // lower multiplier on small to raise the image
          botImg.style.transform = 'translate(' + Math.round(w2 * botXMult) + 'px,' + Math.round(h2 * botYMult) + 'px) rotate(14deg)';
          botImg.style.transformOrigin = 'right bottom';
        }
      }

      var tHandle = null;
      function onResize(){
        clearTimeout(tHandle);
        tHandle = setTimeout(applyPositions, 60);
      }

      // hook image load (in case sizes change)
      document.querySelectorAll('.flower-overlay').forEach(function(img){
        if(!img.complete) img.addEventListener('load', applyPositions);
      });

      window.addEventListener('resize', onResize);
      window.addEventListener('orientationchange', onResize);
      window.addEventListener('load', applyPositions);
      // initial call in case DOM already loaded
      applyPositions();
    })();
  </script>
  <script>
    (function(){
      var btn = document.getElementById('envelopeToggle');
      var env = document.getElementById('envelopeArt');
      var seal = document.querySelector('.seal');
      var left = document.querySelector('.pol-left');
      var right = document.querySelector('.pol-right');
      var vinyl = document.querySelector('.vinyl');
      // optional click/flip sound (place file at sounds/flip.mp3 if desired)
      var flipSound = null;
      try{ flipSound = new Audio('sounds/flip.mp3'); }catch(e){ flipSound = null; }

      function revealSequence(opening){
        if(opening){
          // seal slides down then hides
          if(seal){
            seal.style.transition = 'transform .44s ease, opacity .32s ease';
            seal.style.transform = 'translate(-50%, 52%) scale(.94)';
            seal.style.opacity = '0';
            setTimeout(function(){ if(seal) seal.style.display = 'none'; },420);
          }
          // stagger reveals
          setTimeout(function(){ left && left.classList.add('revealed'); },420);
          setTimeout(function(){ right && right.classList.add('revealed'); },680);
          setTimeout(function(){ vinyl && vinyl.classList.add('revealed'); },960);
          try{ flipSound && flipSound.play(); }catch(e){}
        } else {
          // closing: hide items and restore seal
          left && left.classList.remove('revealed');
          right && right.classList.remove('revealed');
          vinyl && vinyl.classList.remove('revealed');
          if(seal){ seal.style.display = 'block';
            // small timeout to allow display->visible transition
            setTimeout(function(){ seal.style.transition = 'transform .44s ease, opacity .32s ease'; seal.style.transform = 'translate(-50%, -50%)'; seal.style.opacity = '1'; },60);
          }
        }
      }

      if(btn && env){
        btn.addEventListener('click', function(){
          // Wait a tick because the original handler toggles .is-open first
          setTimeout(function(){ revealSequence(env.classList.contains('is-open')); }, 10);
        });
      }
    })();
  </script>
